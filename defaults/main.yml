---
# Required inputs
github_app_id: ""
github_installation_id: ""
github_private_key_b64: ""

# GitHub endpoints (GitHub.com defaults; override for GHE)
github_app_auth_api_url: "https://api.github.com"
github_app_auth_base_url: "https://github.com"

# Token behaviour
github_app_auth_token_ttl_seconds: 3600
github_app_auth_refresh_buffer_seconds: 300

# Cache behaviour
github_app_auth_cache_enabled: true
github_app_auth_cache_dir: "/tmp/github_app_auth"
github_app_auth_cache_file: "{{ github_app_auth_cache_dir }}/installation_token.json"

# Helper execution
github_app_auth_helper_python: "python3"

# Optional repository checkout/update list. Example item:
# - repo: "privacyint/private-repo"
#   dest: "/opt/private-repo"
#   version: "main"
#   update: true
github_app_auth_repositories: []
github_app_auth_git_update: true
github_app_auth_git_accept_hostkey: true

# Output facts
# These are populated by the role at runtime.
github_app_auth_token: ""
github_app_auth_token_expires_at: ""
github_app_auth_token_source: ""
