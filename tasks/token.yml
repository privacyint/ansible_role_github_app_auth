---
- name: Ensure token cache directory exists
  ansible.builtin.file:
    path: "{{ github_app_auth_cache_dir }}"
    state: directory
    mode: "0700"
  when: github_app_auth_cache_enabled | bool

- name: Validate helper Python dependencies are available
  ansible.builtin.command:
    argv:
      - "{{ github_app_auth_helper_python }}"
      - -c
      - import jwt, requests
  register: github_app_auth_helper_deps
  changed_when: false
  failed_when: false

- name: Fail when helper Python dependencies are missing
  ansible.builtin.fail:
    msg: >-
      Helper Python dependencies are missing for {{ github_app_auth_helper_python }}.
      Required modules: PyJWT and requests.
      rc={{ github_app_auth_helper_deps.rc | default(-1) }},
      stderr={{ (github_app_auth_helper_deps.stderr | default('') | trim | replace('\n', ' ')) | truncate(220, true, '...') }}.
      Install into this interpreter (for example):
      {{ github_app_auth_helper_python }} -m pip install --user PyJWT requests
  when: github_app_auth_helper_deps.rc != 0

- name: Request or reuse GitHub installation token
  ansible.builtin.command:
    argv:
      - "{{ github_app_auth_helper_python }}"
      - "{{ role_path }}/files/github_app_token.py"
      - --app-id
      - "{{ github_app_id | string }}"
      - --installation-id
      - "{{ github_installation_id | string }}"
      - --private-key-b64
      - "{{ github_private_key_b64 }}"
      - --api-url
      - "{{ github_app_auth_api_url }}"
      - --ttl-seconds
      - "{{ github_app_auth_token_ttl_seconds | string }}"
      - --refresh-buffer-seconds
      - "{{ github_app_auth_refresh_buffer_seconds | string }}"
      - --cache-enabled
      - "{{ github_app_auth_cache_enabled | ternary('true', 'false') }}"
      - --cache-file
      - "{{ github_app_auth_cache_file }}"
  register: github_app_auth_token_cmd
  failed_when: false
  changed_when: false
  no_log: true

- name: Initialise helper JSON result container
  ansible.builtin.set_fact:
    github_app_auth_token_cmd_json: {}
  no_log: true

- name: Parse helper output JSON when available
  block:
    - name: Parse helper stdout JSON
      ansible.builtin.set_fact:
        github_app_auth_token_cmd_json: "{{ github_app_auth_token_cmd.stdout | from_json }}"
      when:
        - (github_app_auth_token_cmd.stdout | default('') | trim | length) > 0
      no_log: true
  rescue:
    - name: Fail with safe parse diagnostics
      ansible.builtin.fail:
        msg: >-
          GitHub token helper returned non-JSON output.
          rc={{ github_app_auth_token_cmd.rc | default(-1) }},
          stdout_len={{ github_app_auth_token_cmd.stdout | default('') | length }},
          stderr_len={{ github_app_auth_token_cmd.stderr | default('') | length }}.
          Set role debug tasks around this step if deeper diagnostics are needed.

- name: Fail when helper exits non-zero
  ansible.builtin.fail:
    msg: >-
      Failed to acquire GitHub App installation token.
      Helper error: {{ github_app_auth_token_cmd_json.error | default('No structured helper error returned') }}.
      rc={{ github_app_auth_token_cmd.rc | default(-1) }},
      stderr_len={{ github_app_auth_token_cmd.stderr | default('') | length }},
      stderr_preview={{ (github_app_auth_token_cmd.stderr | default('') | trim | replace('\n', ' ')) | truncate(180, true, '...') }}
  when: github_app_auth_token_cmd.rc != 0

- name: Fail when helper success output misses expected fields
  ansible.builtin.fail:
    msg: >-
      GitHub token helper succeeded but response is missing expected fields
      (token/expires_at/source). stdout_len={{ github_app_auth_token_cmd.stdout | default('') | length }}
  when:
    - github_app_auth_token_cmd.rc == 0
    - github_app_auth_token_cmd_json.token is not defined
      or github_app_auth_token_cmd_json.expires_at is not defined
      or github_app_auth_token_cmd_json.source is not defined

- name: Parse helper success output
  ansible.builtin.set_fact:
    github_app_auth_token: "{{ github_app_auth_token_cmd_json.token }}"
    github_app_auth_token_expires_at: "{{ github_app_auth_token_cmd_json.expires_at }}"
    github_app_auth_token_source: "{{ github_app_auth_token_cmd_json.source }}"
  changed_when: (github_app_auth_token_cmd_json.source | default('fresh')) == 'fresh'
  when: github_app_auth_token_cmd.rc == 0
  no_log: false

- name: Expose convenience auth header fact
  ansible.builtin.set_fact:
    github_app_auth_headers:
      Authorization: "token {{ github_app_auth_token }}"
      Accept: "application/vnd.github+json"
  no_log: true
